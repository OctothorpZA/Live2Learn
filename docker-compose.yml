# version: '3'

services:
  payload:
    image: node:22-alpine
    platform: linux/amd64 # Added for M1/M2 Mac compatibility
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    #  - ./certs/aiven-ca.pem:/app/certs/aiven-ca.pem:ro
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    # command: sh -c "yarn install && yarn dev"
    depends_on:
      #  - mongo
      postgres:
        condition: service_healthy # This is the key change
    env_file:
      - .env
      #- .env.local


  # Ensure your DATABASE_URI uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  #mongo:
  #  image: mongo:latest
  #  ports:
  #    - '27017:27017'
  #  command:
  #    - --storageEngine=wiredTiger
  #  volumes:
  #    - data:/data/db
  #  logging:
  #    driver: none

  # Uncomment the following to use postgres
  postgres:
    restart: always
    # Corrected: Use the official PostGIS image instead of the standard postgres image
    image: postgis/postgis:16-3.4
    # image: postgres:latest
    platform: linux/amd64 # Added for M1/M2 Mac compatibility
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck: # This block ensures the DB is ready
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # data:
  pgdata:
  node_modules:
